<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream-50);}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
  .sw{aspect-ratio:1/1.05;border-radius:6px;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid var(--line-warm);color:#0C1220}
  .sw .n{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;opacity:.85;}
  .sw .h{font-family:var(--font-mono);font-size:10px;opacity:.7;}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:#FCFBF6"><div class="n">off-white</div><div class="h">#FCFBF6</div></div>
  <div class="sw" style="background:#FBF7ED"><div class="n">cream 50 · page</div><div class="h">#FBF7ED</div></div>
  <div class="sw" style="background:#F5EFDE"><div class="n">cream 100</div><div class="h">#F5EFDE</div></div>
  <div class="sw" style="background:#EBE2C9"><div class="n">cream 200</div><div class="h">#EBE2C9</div></div>
  <div class="sw" style="background:#DCCFA9"><div class="n">cream 300</div><div class="h">#DCCFA9</div></div>
  <div class="sw" style="background:#FFFFFF"><div class="n">paper</div><div class="h">#FFFFFF</div></div>
</div></body></html>
