<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream-50);}
  .card{padding:32px 36px;}
  .row{display:flex;align-items:baseline;gap:24px;padding:14px 0;border-bottom:1px solid var(--line-warm);}
  .row:last-child{border:0}
  .label{font-family:var(--font-mono);font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-500);min-width:88px;flex-shrink:0;}
  .specimen{font-family:var(--font-display);color:var(--ink-900);line-height:1.05;letter-spacing:-.02em;}
  .h-display{font-size:84px;}
  .h-1{font-size:60px;}
  .h-2{font-size:44px;}
  .italic{font-style:italic;color:var(--blue-500);}
</style></head>
<body><div class="card">
  <div class="row"><span class="label">Display · 84</span><span class="specimen h-display">From <span class="italic">function</span> to built solution.</span></div>
  <div class="row"><span class="label">H1 · 60</span><span class="specimen h-1">We quantify before we build.</span></div>
  <div class="row"><span class="label">H2 · 44</span><span class="specimen h-2">A practical roadmap, in <span class="italic">six weeks</span>.</span></div>
</div></body></html>
