<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream-50);}
  .wrap{padding:28px 36px;}
  .row{display:flex;align-items:center;gap:16px;padding:8px 0;border-bottom:1px dashed transparent;}
  .meta{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;color:var(--ink-500);min-width:170px;text-transform:uppercase;}
  .smp{font-family:var(--font-body);color:var(--ink-900);line-height:1;letter-spacing:-.01em;font-weight:500;}
  .smp.disp{font-family:var(--font-display);font-weight:400;letter-spacing:-.02em;}
  .smp.mono{font-family:var(--font-mono);font-weight:400;}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="meta">112 / display</span><span class="smp disp" style="font-size:84px">Aa</span></div>
  <div class="row"><span class="meta">60 / h1 display</span><span class="smp disp" style="font-size:48px">Aa</span></div>
  <div class="row"><span class="meta">44 / h2 display</span><span class="smp disp" style="font-size:34px">Aa</span></div>
  <div class="row"><span class="meta">24 / h3 sans</span><span class="smp" style="font-size:24px">Aa</span></div>
  <div class="row"><span class="meta">18 / h4 sans</span><span class="smp" style="font-size:18px">Aa</span></div>
  <div class="row"><span class="meta">16 / body</span><span class="smp" style="font-size:16px;font-weight:400">Aa</span></div>
  <div class="row"><span class="meta">14 / small</span><span class="smp" style="font-size:14px;font-weight:400">Aa</span></div>
  <div class="row"><span class="meta">12 / mono eyebrow</span><span class="smp mono" style="font-size:12px;letter-spacing:.16em;text-transform:uppercase">EYEBROW</span></div>
</div></body></html>
