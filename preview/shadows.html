<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream-50);}
  .wrap{padding:36px;display:grid;grid-template-columns:repeat(3,1fr);gap:28px;}
  .item{display:flex;flex-direction:column;align-items:center;gap:14px;}
  .box{width:160px;height:96px;background:#fff;border-radius:8px;}
  .s1{box-shadow:0 1px 0 rgba(12,18,32,0.04), 0 1px 2px rgba(12,18,32,0.04); border:1px solid var(--line-warm);}
  .s2{box-shadow:0 1px 0 rgba(12,18,32,0.04), 0 6px 16px -8px rgba(12,18,32,0.10);}
  .s3{box-shadow:0 2px 0 rgba(12,18,32,0.04), 0 20px 40px -20px rgba(12,18,32,0.18);}
  .name{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-500);}
  .use{font-family:var(--font-body);font-size:12.5px;color:var(--ink-700);}
</style></head>
<body><div class="wrap">
  <div class="item"><div class="box s1"></div><span class="name">shadow-1</span><span class="use">Resting cards (hairline + 2px)</span></div>
  <div class="item"><div class="box s2"></div><span class="name">shadow-2</span><span class="use">Hover · dropdowns</span></div>
  <div class="item"><div class="box s3"></div><span class="name">shadow-3</span><span class="use">Form lift on cream</span></div>
</div></body></html>
