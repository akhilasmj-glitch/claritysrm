<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream-50);}
  .wrap{padding:28px 32px;display:grid;grid-template-columns:1fr 1fr;gap:18px 22px;}
  .field{display:flex;flex-direction:column;gap:6px;}
  .lab{font-family:var(--font-mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-500);}
  input,textarea,select{font-family:var(--font-body);font-size:15px;padding:11px 13px;border:1px solid var(--line-warm);background:#fff;border-radius:4px;color:var(--ink-900);outline:none;}
  input:focus,textarea:focus,select:focus{border-color:#2B5BFF;box-shadow:0 0 0 3px rgba(43,91,255,.15);}
  textarea{resize:vertical;min-height:62px;}
  .hint{font-family:var(--font-body);font-size:12.5px;color:var(--ink-500);}
  .check{display:flex;align-items:center;gap:10px;font-family:var(--font-body);font-size:14px;color:var(--ink-900);}
  .box{width:18px;height:18px;border:1px solid var(--ink-700);border-radius:3px;display:inline-flex;align-items:center;justify-content:center;background:#fff;}
  .box.on{background:#0A1735;border-color:#0A1735;color:#FBF7ED;}
</style></head>
<body><div class="wrap">
  <div class="field"><label class="lab">Full name</label><input type="text" placeholder="Jane Hartley"></div>
  <div class="field"><label class="lab">Work email</label><input type="email" value="jane@firm.com.au" style="border-color:#2B5BFF;box-shadow:0 0 0 3px rgba(43,91,255,.15);"></div>
  <div class="field"><label class="lab">Industry</label><select><option>Construction</option><option>Financial services</option></select></div>
  <div class="field"><label class="lab">Team size</label><input type="text" placeholder="20 – 50"></div>
  <div class="field" style="grid-column:1/-1"><label class="lab">What's slowing you down?</label><textarea placeholder="Tender review takes 3 days. We want it down to hours."></textarea></div>
  <div class="check"><span class="box on"><svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"><polyline points="20 6 9 17 4 12"/></svg></span> Send me the engagement brief</div>
  <div class="check"><span class="box"></span> Subscribe to operator notes</div>
</div></body></html>
