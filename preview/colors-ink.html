<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream-50);}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(5,1fr);gap:14px;}
  .sw{aspect-ratio:1/1.05;border-radius:6px;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid var(--line-warm);}
  .sw .n{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;opacity:.9;}
  .sw .h{font-family:var(--font-mono);font-size:10px;opacity:.7;}
  .dark{color:#fff} .light{color:#0C1220}
</style></head>
<body><div class="wrap">
  <div class="sw dark" style="background:#0C1220"><div class="n">ink 900 · text</div><div class="h">#0C1220</div></div>
  <div class="sw dark" style="background:#2A3346"><div class="n">ink 700</div><div class="h">#2A3346</div></div>
  <div class="sw dark" style="background:#57607A"><div class="n">ink 500 · muted</div><div class="h">#57607A</div></div>
  <div class="sw light" style="background:#8C95AC"><div class="n">ink 300 · faint</div><div class="h">#8C95AC</div></div>
  <div class="sw light" style="background:#B5BCCB"><div class="n">ink 200</div><div class="h">#B5BCCB</div></div>
  <div class="sw light" style="background:#E5DBC0"><div class="n">line warm</div><div class="h">#E5DBC0</div></div>
  <div class="sw light" style="background:#D9DEEA"><div class="n">line cool</div><div class="h">#D9DEEA</div></div>
  <div class="sw dark" style="background:#1F2D4A"><div class="n">line dark</div><div class="h">#1F2D4A</div></div>
  <div class="sw light" style="background:#FCFBF6;border:1px solid #B5BCCB"><div class="n">bg elev</div><div class="h">#FCFBF6</div></div>
  <div class="sw dark" style="background:#0A1735"><div class="n">bg inverse</div><div class="h">#0A1735</div></div>
</div></body></html>
