<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream-50);}
  .wrap{padding:24px;display:grid;grid-template-columns:repeat(6,1fr);gap:14px;}
  .sw{aspect-ratio:1/1.05;border-radius:6px;padding:10px;display:flex;flex-direction:column;justify-content:flex-end;border:1px solid var(--line-warm);}
  .sw .n{font-family:var(--font-mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;opacity:.85;}
  .sw .h{font-family:var(--font-mono);font-size:10px;letter-spacing:.05em;opacity:.7;}
  .dark{color:#fff}
  .light{color:#0C1220}
</style></head>
<body><div class="wrap">
  <div class="sw dark" style="background:#050C1F"><div class="n">navy 950</div><div class="h">#050C1F</div></div>
  <div class="sw dark" style="background:#0A1735"><div class="n">navy 900</div><div class="h">#0A1735</div></div>
  <div class="sw dark" style="background:#122347"><div class="n">navy 800</div><div class="h">#122347</div></div>
  <div class="sw dark" style="background:#1B3262"><div class="n">navy 700</div><div class="h">#1B3262</div></div>
  <div class="sw dark" style="background:#2A4480"><div class="n">navy 600</div><div class="h">#2A4480</div></div>
  <div class="sw dark" style="background:#3D5C9E"><div class="n">navy 500</div><div class="h">#3D5C9E</div></div>
  <div class="sw dark" style="background:#1A47F0"><div class="n">blue 600</div><div class="h">#1A47F0</div></div>
  <div class="sw dark" style="background:#2B5BFF"><div class="n">blue 500 · accent</div><div class="h">#2B5BFF</div></div>
  <div class="sw dark" style="background:#4A75FF"><div class="n">blue 400</div><div class="h">#4A75FF</div></div>
  <div class="sw light" style="background:#8AA6FF"><div class="n">blue 300</div><div class="h">#8AA6FF</div></div>
  <div class="sw light" style="background:#BCCCFF"><div class="n">blue 200</div><div class="h">#BCCCFF</div></div>
  <div class="sw light" style="background:#E1E8FF"><div class="n">blue 100</div><div class="h">#E1E8FF</div></div>
</div></body></html>
