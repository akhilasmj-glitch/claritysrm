<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream-50);}
  .wrap{padding:24px 32px;}
  .row{display:flex;align-items:center;gap:16px;padding:10px 0;}
  .bar{background:var(--navy-900);height:18px;border-radius:2px;}
  .name{font-family:var(--font-mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-500);min-width:90px;}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--ink-300);margin-left:auto;}
</style></head>
<body><div class="wrap">
  <div class="row"><span class="name">space-1</span><span class="bar" style="width:4px"></span><span class="px">4px</span></div>
  <div class="row"><span class="name">space-2</span><span class="bar" style="width:8px"></span><span class="px">8px</span></div>
  <div class="row"><span class="name">space-3</span><span class="bar" style="width:12px"></span><span class="px">12px</span></div>
  <div class="row"><span class="name">space-4</span><span class="bar" style="width:16px"></span><span class="px">16px</span></div>
  <div class="row"><span class="name">space-5</span><span class="bar" style="width:24px"></span><span class="px">24px</span></div>
  <div class="row"><span class="name">space-6</span><span class="bar" style="width:32px"></span><span class="px">32px</span></div>
  <div class="row"><span class="name">space-7</span><span class="bar" style="width:48px"></span><span class="px">48px · card padding</span></div>
  <div class="row"><span class="name">space-8</span><span class="bar" style="width:64px"></span><span class="px">64px</span></div>
  <div class="row"><span class="name">space-9</span><span class="bar" style="width:96px"></span><span class="px">96px · section top</span></div>
  <div class="row"><span class="name">space-10</span><span class="bar" style="width:128px"></span><span class="px">128px · section base</span></div>
  <div class="row"><span class="name">space-11</span><span class="bar" style="width:160px"></span><span class="px">160px · hero</span></div>
</div></body></html>
