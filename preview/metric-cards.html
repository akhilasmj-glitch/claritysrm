<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream-50);}
  .wrap{padding:28px 32px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
  .card{background:#fff;border:1px solid var(--line-warm);border-radius:8px;padding:18px 18px 16px;display:flex;flex-direction:column;gap:6px;}
  .eye{font-family:var(--font-mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-500);}
  .num{font-family:var(--font-mono);font-size:30px;color:var(--ink-900);letter-spacing:-.02em;line-height:1.05;font-feature-settings:"tnum" 1;}
  .num small{font-size:14px;color:var(--ink-500);letter-spacing:0;}
  .lbl{font-family:var(--font-body);font-size:13px;color:var(--ink-500);line-height:1.4;}
</style></head>
<body><div class="wrap">
  <div class="card"><span class="eye">Per process</span><span class="num">12 – 23<small> hrs</small></span><span class="lbl">Saved after automation</span></div>
  <div class="card"><span class="eye">Monthly</span><span class="num">0.3 – 1.2<small> FTE</small></span><span class="lbl">Capacity returned to the team</span></div>
  <div class="card"><span class="eye">Document content</span><span class="num">65 – 85<small>%</small></span><span class="lbl">Generated automatically</span></div>
  <div class="card"><span class="eye">Turnaround</span><span class="num">days → hrs</span><span class="lbl">Loan docs · tender reviews</span></div>
</div></body></html>
