<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--cream-50);}
  .wrap{padding:28px 32px;display:flex;gap:28px;align-items:flex-end;flex-wrap:wrap;}
  .item{display:flex;flex-direction:column;align-items:center;gap:10px;}
  .box{width:84px;height:84px;background:#fff;border:1px solid var(--line-warm);}
  .name{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-500);}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--ink-300);}
  .use{font-family:var(--font-body);font-size:12px;color:var(--ink-700);}
</style></head>
<body><div class="wrap">
  <div class="item"><div class="box" style="border-radius:2px"></div><span class="name">xs · 2</span><span class="use">dividers</span></div>
  <div class="item"><div class="box" style="border-radius:4px"></div><span class="name">sm · 4</span><span class="use">buttons · inputs</span></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><span class="name">md · 8</span><span class="use">cards</span></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><span class="name">lg · 12</span><span class="use">media containers</span></div>
  <div class="item"><div class="box" style="border-radius:20px"></div><span class="name">xl · 20</span><span class="use">rare · hero shapes</span></div>
  <div class="item"><div class="box" style="border-radius:999px"></div><span class="name">pill</span><span class="use">status chips</span></div>
</div></body></html>
